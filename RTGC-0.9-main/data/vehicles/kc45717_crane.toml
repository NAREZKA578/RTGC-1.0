# Автокран КС-45717К-1 "Галичанин" - 25 тонн
# Мобильный кран на шасси КАМАЗ

[mesh]
file = "vehicles/kc45717.obj"
scale = 1.0
center_offset = [0.0, 1.5, 0.0]

[collider]
type = "compound"
children = [
    { type = "box", size = [12.0, 2.5, 3.5], offset = [0.0, 1.2, -1.0] }, # шасси
    { type = "box", size = [8.0, 0.5, 2.5], offset = [0.0, 0.3, 2.0] }, # outriggers
    { type = "cylinder", radius = 1.2, height = 1.5, offset = [0.0, 2.5, 0.5] } # поворотная платформа
]

[rigidbody]
mass = 24000.0
max_lift_kg = 25000.0
linear_damping = 0.1
angular_damping = 0.95
ccd_enabled = true

[chassis]
base_vehicle = "kamaz_65115"
wheelbase_m = 5.2
outriggers:
    type = "hydraulic_h_box"
    front_reach_m = 6.2
    rear_reach_m = 5.8
    pad_size_m = 0.5
    interlock_required = true
    ground_pressure_monitor = true

[crane]
model = "KS-45717K-1"
manufacturer = "Galichanin"
max_capacity_kg = 25000
max_radius_m = 21.0
min_radius_m = 3.5
max_lift_height_m = 31.0
max_hook_height_m = 33.0

[boom]
type = "telescopic_4_section"
material = "high_strength_steel"
sections = 4
extended_length_m = 28.0
retracted_length_m = 9.5
elevation_range_deg = [-3, 80]
extension_speed_m_s = 0.15
retraction_speed_m_s = 0.2
max_extension_force_t = 18.0
safety_load_sensor = true

[slewing]
type = "electric_slew_ring"
diameter_mm = 1250
rotation_range_deg = 360
continuous_rotation = true
max_speed_rpm = 2.5
brake_type = "disc_spring_applied"
position_encoder = true
slew_lock_transport = true

[hoist]
type = "electric_planetary"
main_line:
    capacity_kg = 25000
    line_pull_kn = 75.0
    rope_diameter_mm = 18.0
    rope_layers = 4
    speed_m_min = [1.5, 12.0]
    brake_type = "automatic_fail_safe"
aux_line:
    capacity_kg = 3000
    speed_m_min = [2.0, 25.0]
    quick_change = true
hook_block:
    weight_kg = 380
    sheaves = 4
    safety_latch = true

[hydraulics]
pump:
    type = "axial_piston_variable"
    flow_rate_l_min = 180
    max_pressure_bar = 320
    power_source = "engine_pto"
    
valves:
    main_control = "electro_hydraulic_proportional"
    load_holding = "pilot_operated_check"
    overload_protection = "pressure_relief"
    
cylinders:
    boom_lift:
        bore_mm = 140
        stroke_mm = 4200
        stages = 2
    boom_extend:
        bore_mm = 100
        stroke_mm = 9000
        stages = 3
    outrigger:
        bore_mm = 125
        stroke_mm = 1400
        stages = 2

[stability]
lic_system = true # Load Indicator Computer
moment_limiter = true
zone_protection = ["front", "rear", "side"]
wind_speed_limit_ms = 12.0
ground_slope_limit_deg = 1.5
anti_two_block = true
swing_load_dampening = true

[safety_devices]
overload_sensor = "strain_gauge"
angle_sensor = "inclinometer_dual_axis"
length_sensor = "cable_potentiometer"
rotation_sensor = "absolute_encoder"
visual_alarm = "rotating_beacon"
audio_alarm = "backup_beeper"
emergency_stop_buttons = 3
fire_extinguisher = "automatic_engine_compartment"

[controls]
operator_station = "upper_seat"
joysticks = "electro_hydraulic_proportional"
display = "touchscreen_lmi"
remote_control = "optional_radio"
cab_heating = true
cab_rotation = 270

[transport]
travel_speed_kmh = 60
height_m = 3.8
width_m = 2.55
length_m = 12.5
weight_total_kg = 24000
axle_load_front_kg = 7500
axle_load_rear_kg = 16500

[damage]
structural_stress_model = true
wire_rope_wear = true
hydraulic_leak_simulation = true
outrigger_failure_mode = "gradual_sink"
tip_over_physics = true

[sounds]
engine_start = "sounds/engines/kamaz_start.wav"
engine_idle = "sounds/engines/kamaz_idle.wav"
pto_engage = "sounds/mechanical/pto_clunk.wav"
hydraulic_pump = "sounds/hydraulics/pump_whine.wav"
boom_extend = "sounds/hydraulics/cylinder_extend.wav"
boom_retract = "sounds/hydraulics/cylinder_retract.wav"
boom_lift = "sounds/hydraulics/cylinder_lift.wav"
boom_lower = "sounds/hydraulics/cylinder_lower.wav"
slew_left = "sounds/electric/slew_motor_left.wav"
slew_right = "sounds/electric/slew_motor_right.wav"
hoist_up = "sounds/electric/hoist_up.wav"
hoist_down = "sounds/electric/hoist_down.wav"
warning_beep = "sounds/alarms/backup_beep.wav"
lmi_alert = "sounds/alarms/overload_warning.wav"

[visuals]
work_lights = [
    { position = [0.0, 8.0, 0.0], direction = [0, -0.3, 0], fov = 120, range = 60 },
    { position = [-2.0, 3.0, 1.0], direction = [0, 0, -1], fov = 60, range = 40 },
    { position = [2.0, 3.0, 1.0], direction = [0, 0, -1], fov = 60, range = 40 }
]
beacon = {
    position = [0.0, 9.0, 0.0],
    color = [1.0, 0.8, 0.0],
    flash_rate_hz = 2.0,
    rotation = true
}
outrigger_markers = {
    color = [1.0, 0.5, 0.0],
    glow_intensity = 0.8
}
load_chart_display = "hud_overlay"

[variants]
standard = {
    boom_sections = 4,
    jib_mount = "optional"
}
with_jib = {
    jib_length_m = 9.0,
    jib_offset_deg = [0, 20, 40],
    max_height_with_jib_m = 40.0
}
construction = {
    mud_flaps = true,
    additional_lighting = true,
    tool_boxes = 2
}
rental = {
    gps_tracking = true,
    hour_meter_remote = true,
    security_lockout = true
}

[certifications]
russia = "GOST-R certified"
eu = "CE marked optional"
inspection_interval_hours = 500
annual_inspection_required = true
