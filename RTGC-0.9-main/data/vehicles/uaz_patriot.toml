# UAZ Patriot (УАЗ Патриот) - Базовый внедорожник
# Физическая модель: коробка передач, раздатка, дифференциалы, подвеска

[mesh]
file = "vehicles/uaz_patriot.obj"
scale = 1.0
center_offset = [0.0, 0.5, 0.0]

[collider]
type = "compound"
children = [
    { type = "box", size = [4.8, 1.8, 2.0], offset = [0.0, 0.5, 0.0] },
    { type = "box", size = [1.2, 0.3, 1.6], offset = [-1.8, 0.3, 0.0] }, # передний бампер
    { type = "box", size = [1.2, 0.3, 1.6], offset = [1.8, 0.3, 0.0] }  # задний бампер
]

[rigidbody]
mass = 2500.0
linear_damping = 0.1
angular_damping = 0.9
ccd_enabled = true

[suspension]
type = "independent"
front:
    spring_strength = 35000.0
    damping = 4500.0
    travel = 0.25
    wheel_radius = 0.4
    wheel_width = 0.3
    positions = [
        [-1.4, 0.4, 1.1],   # front-left
        [1.4, 0.4, 1.1]     # front-right
    ]
rear:
    spring_strength = 45000.0
    damping = 5500.0
    travel = 0.3
    wheel_radius = 0.4
    wheel_width = 0.3
    positions = [
        [-1.4, 0.4, -1.1],  # rear-left
        [1.4, 0.4, -1.1]    # rear-right
    ]

[drivetrain]
engine:
    type = "inline4"
    displacement_l = 2.7
    max_power_hp = 150
    max_torque_nm = 235
    rpm_idle = 800
    rpm_max = 5500
    inertia = 0.15
    friction = 0.02
    
transmission:
    type = "manual"
    gears = 5
    reverse_gears = 1
    final_drive = 4.1
    gear_ratios = [3.5, 2.1, 1.4, 1.0, 0.82]
    reverse_ratio = -3.2
    shift_time_ms = 400
    
transfer_case:
    enabled = true
    low_range_ratio = 2.5
    modes = ["2H", "4H", "4L"]
    
differentials:
    front:
        type = "open"
        lockable = false
    center:
        type = "part_time_4wd"
        locked_in_4wd = true
    rear:
        type = "lsd"
        preload_nm = 50.0

[wheels]
friction_table = "asphalt_mud_snow"
tire_pressure_bar = 2.2
wear_rate = 0.0001

[steering]
max_angle_deg = 35.0
ratio = 16.0
speed_dependent = true
min_ratio = 14.0
max_ratio = 18.0

[brakes]
front:
    type = "disc_vented"
    diameter_mm = 320
    thickness_mm = 28
    material = "ceramic"
rear:
    type = "disc"
    diameter_mm = 300
    thickness_mm = 25
    material = "cast_iron"
abs_enabled = true
ebd_enabled = true

[aerodynamics]
drag_coefficient = 0.45
frontal_area_m2 = 2.8
lift_coefficient_front = 0.1
lift_coefficient_rear = 0.15
side_area_m2 = 7.2

[damage]
crumple_zones = ["front", "rear"]
max_deformation_m = 0.3
repair_cost_multiplier = 1.2

[interior]
seats = 5
cargo_volume_l = 650
fuel_tank_l = 68

[sounds]
engine_start = "sounds/engines/uaz_start.wav"
engine_idle = "sounds/engines/uaz_idle.wav"
engine_load = "sounds/engines/uaz_load.wav"
turbo = null
gear_shift = "sounds/transmission/gear_click.wav"
horn = "sounds/horn/standard.wav"

[visuals]
headlights = [
    { position = [-0.8, 0.6, 2.1], direction = [0, 0, 1], fov = 45, range = 80 },
    { position = [0.8, 0.6, 2.1], direction = [0, 0, 1], fov = 45, range = 80 }
]
taillights = [
    { position = [-0.9, 0.7, -2.15], color = [1.0, 0.0, 0.0] },
    { position = [0.9, 0.7, -2.15], color = [1.0, 0.0, 0.0] }
]
indicators = [
    { position = [-0.95, 0.7, 2.0], color = [1.0, 0.8, 0.0], side = "front_left" },
    { position = [0.95, 0.7, 2.0], color = [1.0, 0.8, 0.0], side = "front_right" },
    { position = [-0.95, 0.7, -2.15], color = [1.0, 0.8, 0.0], side = "rear_left" },
    { position = [0.95, 0.7, -2.15], color = [1.0, 0.8, 0.0], side = "rear_right" }
]

[variants]
base = {}
expedition = { 
    roof_rack = true, 
    snorkel = true, 
    winch_front = true,
    tire_type = "mud_terrain"
}
pickup = {
    bed_length_m = 1.6,
    cargo_cover = "hard_top"
}
