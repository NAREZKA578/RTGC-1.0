# KAMAZ-65115 - Самосвал
# Тяжёлый грузовик для перевозки сыпучих грузов

[mesh]
file = "vehicles/kamaz_65115.obj"
scale = 1.0
center_offset = [0.0, 1.2, 0.0]

[collider]
type = "compound"
children = [
    { type = "box", size = [7.5, 2.5, 3.2], offset = [0.0, 1.0, -0.5] }, # кабина + кузов
    { type = "box", size = [2.0, 0.4, 2.5], offset = [-3.5, 0.4, 0.0] }, # передний бампер
    { type = "box", size = [2.0, 0.4, 2.5], offset = [3.5, 0.4, 0.0] }   # задняя балка
]

[rigidbody]
mass = 10500.0
max_cargo_mass = 15000.0
linear_damping = 0.15
angular_damping = 0.95
ccd_enabled = true

[suspension]
type = "leaf_spring"
front:
    spring_strength = 180000.0
    damping = 25000.0
    travel = 0.15
    wheel_radius = 0.55
    wheel_width = 0.4
    positions = [
        [-0.9, 0.8, 2.8],   # front-left
        [0.9, 0.8, 2.8]     # front-right
    ]
rear:
    type = "tandem"
    spring_strength = 350000.0
    damping = 45000.0
    travel = 0.12
    wheel_radius = 0.55
    wheel_width = 0.4
    positions = [
        [-0.9, 0.8, -1.5],  # rear-left-1
        [0.9, 0.8, -1.5],   # rear-right-1
        [-0.9, 0.8, -2.5],  # rear-left-2
        [0.9, 0.8, -2.5]    # rear-right-2
    ]

[drivetrain]
engine:
    type = "v8_turbo_diesel"
    displacement_l = 11.76
    max_power_hp = 400
    max_torque_nm = 1570
    rpm_idle = 600
    rpm_max = 2500
    inertia = 0.8
    friction = 0.03
    turbo:
        boost_pressure_bar = 1.8
        lag_ms = 150
    
transmission:
    type = "manual_zf"
    gears = 8
    reverse_gears = 2
    final_drive = 5.11
    gear_ratios = [7.8, 5.4, 3.9, 2.9, 2.1, 1.5, 1.0, 0.75]
    reverse_ratios = [-7.0, -5.0]
    shift_time_ms = 600
    clutch_wear_rate = 0.00005
    
transfer_case:
    enabled = false
    
differentials:
    front:
        type = "none"
    center:
        type = "interaxle"
        lockable = true
    rear:
        type = "planetary"
        ratio = 3.5
        lockable = true

[wheels]
count = 6
friction_table = "truck_all_terrain"
tire_pressure_bar = 8.5
wear_rate = 0.00008
dual_rear = true

[steering]
max_angle_deg = 45.0
ratio = 20.0
hydraulic_booster = true
turn_radius_m = 10.5

[brakes]
type = "pneumatic_disc"
front:
    diameter_mm = 430
    thickness_mm = 45
rear:
    diameter_mm = 430
    thickness_mm = 45
abs_enabled = true
ebr_enabled = true
retarder:
    type = "exhaust_brake"
    max_power_kw = 300

[aerodynamics]
drag_coefficient = 0.65
frontal_area_m2 = 8.5
lift_coefficient_front = 0.2
lift_coefficient_rear = 0.3
side_area_m2 = 22.0
crosswind_sensitivity = 0.4

[dump_body]
capacity_m3 = 10.0
tilt_angle_deg = 55.0
tilt_speed_deg_per_sec = 8.0
hydraulic_pump:
    flow_rate_l_min = 80
    max_pressure_bar = 200
materials = ["sand", "gravel", "soil", "coal", "snow"]
unload_time_s = 12.0

[damage]
crumple_zones = ["front", "cab"]
max_deformation_m = 0.5
repair_cost_multiplier = 1.5
frame_stress_model = true

[interior]
seats = 2
sleeper = false
air_conditioning = true
dashboard_display = "digital_analog"

[pneumatics]
tank_capacity_l = 40.0
compressor_flow_l_min = 160
max_pressure_bar = 10.0
circuits = ["brakes", "suspension", "dump_body", "clutch_boost"]

[sounds]
engine_start = "sounds/engines/kamaz_start.wav"
engine_idle = "sounds/engines/kamaz_idle.wav"
engine_load = "sounds/engines/kamaz_load.wav"
turbo = "sounds/engines/turbo_whistle.wav"
gear_shift = "sounds/transmission/truck_shift.wav"
horn = "sounds/horn/air_horn.wav"
dump_lift = "sounds/hydraulics/dump_lift.wav"
dump_lower = "sounds/hydraulics/dump_lower.wav"

[visuals]
headlights = [
    { position = [-1.2, 1.5, 3.8], direction = [0, 0, 1], fov = 50, range = 120 },
    { position = [1.2, 1.5, 3.8], direction = [0, 0, 1], fov = 50, range = 120 }
]
fog_lights = [
    { position = [-1.5, 0.8, 3.9], direction = [0, -0.2, 1], fov = 60, range = 40 },
    { position = [1.5, 0.8, 3.9], direction = [0, -0.2, 1], fov = 60, range = 40 }
]
taillights = [
    { position = [-1.3, 1.8, -3.9], color = [1.0, 0.0, 0.0] },
    { position = [1.3, 1.8, -3.9], color = [1.0, 0.0, 0.0] }
]
work_lights = [
    { position = [0.0, 3.0, -2.0], direction = [0, -0.5, -1], fov = 90, range = 50 }
]

[variants]
base = {}
construction = { 
    beacon_light = "amber_rotating",
    mud_flaps = true,
    additional_tank_l = 200
}
winter = {
    engine_heater = true,
    fuel_filter_heater = true,
    tire_chains_compatible = true
}
