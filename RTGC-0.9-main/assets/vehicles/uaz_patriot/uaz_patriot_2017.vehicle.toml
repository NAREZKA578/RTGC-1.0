# UAZ Patriot 2017 Vehicle Configuration
# Real parameters for ZMZ-409 engine, 4x4 drivetrain

[vehicle]
name = "UAZ Patriot 2017"
type = "suv"
mass = 2100.0  # kg (curb weight)
length = 4.75  # m
width = 2.10   # m (with mirrors)
height = 1.90  # m
wheelbase = 2.76  # m
track_front = 1.68  # m
track_rear = 1.68   # m
ground_clearance = 0.21  # m
drag_coefficient = 0.45
reference_area = 3.8  # m² (frontal area)

[engine]
# ZMZ-409 Euro-5 real specifications
name = "ZMZ-409 Euro-5"
type = "inline_4_petrol"
displacement = 2.693  # liters (2693 cc)
max_power = 149.6  # hp @ 5000 rpm
max_torque = 235.4  # Nm @ 2650 rpm
idle_rpm = 850.0
redline_rpm = 5500.0
compression_ratio = 9.8
fuel_type = "AI-92"
fuel_consumption_city = 14.5  # L/100km
fuel_consumption_highway = 10.5  # L/100km
fuel_tank_capacity = 68.0  # liters
oil_capacity = 7.0  # liters
coolant_capacity = 12.0  # liters

# Torque curve approximation (rpm, torque_multiplier)
# Peak torque at 2650 rpm, falls off at low and high rpm
torque_curve = [
    [850.0, 0.65],
    [1500.0, 0.85],
    [2000.0, 0.95],
    [2650.0, 1.0],
    [3500.0, 0.92],
    [4500.0, 0.80],
    [5000.0, 0.70],
    [5500.0, 0.55],
]

[transmission]
type = "manual_5spd"
gears = 5
reverse_gears = 1
gear_ratios = [3.78, 2.44, 1.43, 1.0, 0.83]  # 1st to 5th
reverse_ratio = -3.28
final_drive = 4.625  # main differential ratio
transfer_case = true
transfer_low_range = 2.542  # low range multiplier
clutch_friction = 0.85

[drivetrain]
drive_type = "4x4_part_time"  # part-time 4WD with selectable modes
modes = ["2wd_rear", "4wd_high", "4wd_low"]
default_mode = "4wd_high"
differential_type = "open"
locking_differentials = false

[wheels]
# Real tire size: 235/75 R16
count = 4
tire_width = 0.235  # m (235mm)
aspect_ratio = 75     # sidewall height % of width
rim_diameter = 16     # inches
rolling_radius = 0.41  # m (calculated from tire size)
pressure_psi = 30.0   # recommended tire pressure
wear_rate = 0.0001    # wear per km
grip_dry = 0.85
grip_wet = 0.65
grip_mud = 0.35
grip_snow = 0.50
grip_ice = 0.15
lateral_stiffness = 8.0
longitudinal_stiffness = 10.0

[suspension]
type = "dependent_leaf_rear_independent_front"
front_spring_rate = 45.0  # N/mm
rear_spring_rate = 55.0   # N/mm
front_damping_compression = 2500.0  # N/(m/s)
front_damping_rebound = 3500.0      # N/(m/s)
rear_damping_compression = 3000.0   # N/(m/s)
rear_damping_rebound = 4000.0       # N/(m/s)
front_travel_up = 0.12    # m
front_travel_down = 0.10  # m
rear_travel_up = 0.15     # m
rear_travel_down = 0.12   # m
anti_roll_bar_front = 800.0  # Nm/deg
anti_roll_bar_rear = 600.0   # Nm/deg

[brakes]
front_type = "ventilated_disc"
rear_type = "disc"
front_diameter = 0.30  # m (300mm)
rear_diameter = 0.28   # m (280mm)
front_bias = 0.65      # brake force distribution
max_brake_pressure = 120.0  # bar
abs = true
ebd = true  # electronic brake distribution

[steering]
type = "recirculating_ball"
ratio = 18.5  # steering ratio
lock_to_lock_turns = 4.2
max_steering_angle = 32.0  # degrees
power_assist = true
assist_type = "hydraulic"

[winch]
# Factory winch option
present = true
max_pull_kg = 4500.0
cable_length_m = 30.0
cable_diameter_mm = 9.0
motor_power_kw = 4.5
gear_ratio = 180.0
speed_m_per_min = 4.5

[colors]
# 12 factory colors available
available = [
    { name = "Arctic White", rgb = [0.95, 0.95, 0.95] },
    { name = "Silver Metallic", rgb = [0.75, 0.75, 0.78] },
    { name = "Dark Gray", rgb = [0.35, 0.35, 0.38] },
    { name = "Black", rgb = [0.12, 0.12, 0.15] },
    { name = "Red", rgb = [0.65, 0.15, 0.15] },
    { name = "Blue", rgb = [0.15, 0.25, 0.55] },
    { name = "Green", rgb = [0.20, 0.35, 0.20] },
    { name = "Beige", rgb = [0.75, 0.68, 0.55] },
    { name = "Brown", rgb = [0.40, 0.28, 0.18] },
    { name = "Orange", rgb = [0.80, 0.45, 0.15] },
    { name = "Yellow", rgb = [0.90, 0.80, 0.20] },
    { name = "Khaki", rgb = [0.55, 0.52, 0.40] },
]

[initial_condition]
# Default condition when spawned
mileage_km = 15000.0  # random used vehicle
engine_integrity = 0.85  # 85% health
transmission_integrity = 0.88
drivetrain_integrity = 0.82
suspension_integrity = 0.80
brake_integrity = 0.85
tire_integrity = 0.75  # worn tires
battery_health = 0.80
paint_integrity = 0.90
rust_level = 0.10  # minor surface rust

[fuel_system]
tank_capacity_liters = 68.0
fuel_level = 0.5  # starts half full (34L)
fuel_pump_pressure = 3.5  # bar
injector_flow_rate = 180.0  # cc/min

[electrical]
battery_voltage = 12.0
battery_capacity_ah = 75.0
alternator_output_a = 120.0
starter_power_kw = 2.2

[dimensions_cargo]
trunk_volume_liters = 650
trunk_volume_seats_down_liters = 2400
max_payload_kg = 525
towing_capacity_kg = 1500
roof_rail_capacity_kg = 100
