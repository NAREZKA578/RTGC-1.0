# UI Configuration for RTGC-0.8

[hud]
enabled = true
opacity = 0.85
scale = 1.0
position = "top_left"

[crosshair]
enabled = true
style = "dot"  # dot, circle, cross, none
size = 4.0
color = [255, 255, 255, 200]
dynamic = true  # expands when moving

[minimap]
enabled = true
size = 200  # pixels
zoom_levels = [0.5, 1.0, 2.0, 4.0]
default_zoom = 1.0
rotation = "player"  # player, north_up
show_waypoints = true
show_vehicles = true
show_npcs = true

[compass]
enabled = true
position = "top_center"
style = "horizontal"  # horizontal, arc
show_degrees = true

[clock]
enabled = true
position = "top_right"
format = "24h"  # 12h, 24h
show_date = true

[notifications]
enabled = true
max_visible = 5
position = "bottom_right"
fade_in = 0.2
fade_out = 0.5
duration_info = 3.0
duration_success = 4.0
duration_warning = 5.0
duration_error = 6.0

[speedometer]
enabled = false  # auto-enabled in vehicle
position = "bottom_right"
style = "digital"  # digital, analog, both
units = "kmh"  # kmh, mph
show_gear = true
show_rpm = true
rpm_redline = 6000

[fuel_gauge]
enabled = false  # auto-enabled in vehicle
position = "bottom_right"
style = "bar"  # bar, circular, digital
show_liters = true
show_range = true  # estimated range

[interaction_prompt]
enabled = true
position = "center_bottom"
show_distance = true
highlight_color = [255, 215, 0, 255]  # gold

[debug_overlay]
default_enabled = false
toggle_key = "F3"
show_fps = true
show_memory = true
show_physics = true
show_position = true
show_skills = true
